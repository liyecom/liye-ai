schema_version: "2.1"
engine_id: amazon-growth-engine
engine_version: "1.0.0"
domain: amazon-advertising
contracts_compat: ">=2.0 <3.0"

playbooks:
  - id: anomaly_detect
    entrypoint: src/playbooks/anomaly_detect.py
    description: "fixture placeholder"
    required_permissions:
      - read:metrics
    io_schema:
      inputs: {}
      outputs: {}
    status: placeholder

data_sources:
