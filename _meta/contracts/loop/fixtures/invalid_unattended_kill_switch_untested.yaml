# FIXTURE (expect: FAIL on C11b) — an unattended_autonomous loop whose kill_switch
# honestly says tested:false. Honesty does not buy unattended: with nobody watching,
# an undrilled kill switch is decoration, and the loop may not run unattended until
# the switch has been flipped in a drill and the halt observed (tested:true + C11a
# evidence). The full C6 attestation bundle IS present (internal_beta runner,
# attestation ref+hash, dedupe_key, lock_ref) so C6 passes — C11b is the sole gate.
contract_kind: governed_work_loop
schema_version: "2.0.0"
contract_status: schema_validated_only
instance_scope: template

loop_identity:
  template_ref: "_meta/contracts/loop/templates/example.template.yaml"
  runner_ref: "single_taskrun_executor"
  runner_readiness:
    level: internal_beta
    attestation_ref: "state/runtime/loop/attestation/drift_runner.json"
    attested_hash: "0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f0e9f"

goal:
  statement: "无人值守巡检 manifest drift 并发 verdict，不改任何文件。"
  lifecycle: active
  success_criteria:
    - id: SC1
      statement: "每轮巡检都产出一条 drift verdict。"

scope:
  scope_roots: ["state/runtime/manifest"]
  no_mutation: true
  control_plane_touch: false
  allowed_actions: [read_file, grep]

invariants:
  hard: []
  review: []

evidence:
  authoritative:
    - check:
        command: "node tools/manifest-drift.mjs --check"
      expected:
        kind: exit_code
        value: 0
      artifact_ref: "state/runtime/loop/drift/drift_report.json"

checker:
  independence_level: deterministic
  hard_gate_grading: deterministic_only
  on_checker_error: fail_closed
  readable_artifacts: ["the drift report"]
  forbids_reading_maker_reasoning: true

runtime:
  mode: unattended_autonomous
  scheduler_owner: launchd
  dedupe_key: "drift-monitor-hourly"
  lock_ref: "state/runtime/loop/drift/.lock"

budget:
  limits:
    wall_clock_seconds: 600
  on_exhaustion: stop_new_mutations_then_wrap_up

stop_condition:
  success_check:
    kind: deterministic_predicate
    check_ref: "node tools/manifest-drift.mjs --check"
  max_iterations: 24
  on_max_iterations: stop_inconclusive_then_wrap_up

kill_switch:
  mechanism: file_sentinel
  location: "state/runtime/loop/drift/ENABLE"
  polarity: enable_required
  halt_semantics: no_new_iterations_then_wrap_up
  tested: false   # <-- VIOLATES C11b: unattended requires a DRILLED kill switch

evidence_package:
  required_contents: [contract_snapshot, iteration_log, evidence_items, final_verdict, wrap_up]
  package_ref: "state/runtime/loop/drift/package/"

control_plane_mutation: none

next_action_card:
  enum: [continue, stop_success, stop_inconclusive, stop_dormant]
  maps_to_existing_status:
    continue: "TaskStatus.EXECUTING | VerdictDecision.EXPAND"
    ask_human: "TaskStatus.AWAITING_APPROVAL | NextStep.REQUEST_APPROVAL"
    stop_success: "TaskStatus.COMPLETED | VerdictDecision.PASS"
    stop_inconclusive: "VerdictDecision.HOLD | HoldReason.INSUFFICIENT_EVIDENCE"
    stop_dormant: "TaskStatus.BLOCKED | NextStep.RETRY_LATER"
    escalate_live_authorization: "NextStep.ENABLE_WRITES | NextStep.CLEAR_KILL_SWITCH"

wrap_up:
  done: []
  undone: []
  failed_commands: []
  assumptions: []
  next_steps: []
