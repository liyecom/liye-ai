# Live Site Protection Gate
# §4.6 Live vs Example 站点治理 - CI 强制执行
#
# 防止 Live 站点（客户资产）被意外提交到公开仓库
# 只有 example-site/ 允许被 tracked
#
# 刻意在每个 PR 上运行（无 paths 过滤）：GitHub required status check
# 不出勤即永久阻塞合并，path 过滤会把不碰 websites/ 的 PR 全部卡死。
# 未改动 websites/ 时 git diff 为空，classifier 直接放行，成本为秒级。

name: Live Site Gate

on:
  pull_request:

jobs:
  check-live-sites:
    name: Block Live Sites from PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run classifier regression fixtures
        run: bash tests/governance/test_live_site_gate.sh

      - name: Check for Live Site files
        run: |
          echo "🛡️ §4.6 Live Site Gate - Checking for unauthorized site files..."
          echo ""

          # Get changed files in websites/ directory
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- websites/)

          if [ -z "$CHANGED" ]; then
            echo "✅ No websites/ changes detected"
            exit 0
          fi

          echo "📂 Changed files in websites/:"
          echo "$CHANGED"
          echo ""

          # Classify with a runner-compatible ERE. Status 1 is a policy block;
          # status 2+ is a matcher/tool failure and must also fail closed.
          set +e
          LIVE_FILES=$(printf '%s\n' "$CHANGED" | .github/scripts/check-live-site-files.sh)
          CLASSIFIER_STATUS=$?
          set -e

          if [ "$CLASSIFIER_STATUS" -eq 1 ]; then
            echo ""
            echo "❌ BLOCKED: Live site files detected in PR!"
            echo ""
            echo "The following files violate §4.6 Live vs Example governance:"
            echo "$LIVE_FILES"
            echo ""
            echo "📜 Rule: Only websites/example-site/ may be tracked in this repository."
            echo "         Live sites (kuachu, timomats, refetone, etc.) are customer assets"
            echo "         and must remain gitignored."
            echo ""
            echo "🔧 Fix: Remove these files from your commit:"
            echo "   git rm -r --cached <path>"
            echo "   git commit --amend"
            exit 1
          fi

          if [ "$CLASSIFIER_STATUS" -ne 0 ]; then
            echo ""
            echo "❌ BLOCKED: Live site classifier failed (exit $CLASSIFIER_STATUS)"
            echo "The gate cannot classify safely, so this PR fails closed."
            exit 1
          fi

          echo "✅ All websites/ changes are in allowed paths (example-site/, .gitignore, README.md, _templates/)"
